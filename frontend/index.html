<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#6366f1"/>
  <title>Hub Pessoal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --atlas: #6366f1;
      --atlas-dark: #4f46e5;
      --atlas-light: #eef2ff;
      --fit: #10b981;
      --fit-dark: #059669;
      --fit-light: #ecfdf5;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --atlas-light: #1e1b4b;
      --fit-light: #022c22;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .3s, color .3s; }

    /* Loading Screen */
    #loadingScreen {
      position: fixed; inset: 0; background: var(--atlas); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 20px;
    }
    #loadingScreen .logo { animation: pulse 1.5s ease-in-out infinite; }
    #loadingScreen .logo svg { width: 72px; height: 72px; }
    #loadingScreen p { color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 500; }
    .loading-bar { width: 160px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden; }
    .loading-bar-inner { height: 100%; background: white; border-radius: 99px; animation: loadbar 1.8s ease-in-out infinite; }
    @keyframes loadbar { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

    /* Auth Screen */
    #authScreen { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
    #authScreen.visible { display: flex; }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg);
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo svg { width: 52px; height: 52px; margin: 0 auto 12px; display: block; }
    .auth-logo h1 { font-size: 22px; font-weight: 800; color: var(--text); }
    .auth-logo p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
    .auth-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
    .auth-tab { flex: 1; padding: 8px; text-align: center; font-size: 14px; font-weight: 500; border: none; background: none; color: var(--text-muted); cursor: pointer; border-radius: 8px; transition: all .2s; }
    .auth-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); transition: border-color .2s, box-shadow .2s; outline: none; }
    input:focus { border-color: var(--atlas); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; font-family: inherit; }
    .btn-primary { background: var(--atlas); color: white; width: 100%; }
    .btn-primary:hover { background: var(--atlas-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
    .btn-link { background: none; color: var(--atlas); font-size: 13px; padding: 0; text-decoration: underline; cursor: pointer; border: none; font-family: inherit; }
    .auth-footer { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
    .auth-error { background: #fee2e2; color: #b91c1c; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .auth-success { background: #dcfce7; color: #15803d; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    [data-theme="dark"] .auth-error { background: rgba(185,28,28,.2); color: #fca5a5; }
    [data-theme="dark"] .auth-success { background: rgba(21,128,61,.2); color: #86efac; }

    /* Launcher */
    #launcherScreen { display: none; min-height: 100vh; flex-direction: column; }
    #launcherScreen.visible { display: flex; }
    .launcher-header { padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
    .launcher-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; }
    .launcher-brand svg { width: 32px; height: 32px; }
    .launcher-header-right { display: flex; align-items: center; gap: 12px; }
    .user-info { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
    .user-avatar { width: 34px; height: 34px; background: linear-gradient(135deg, var(--atlas), var(--atlas-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 600; box-shadow: 0 2px 8px rgba(99,102,241,0.3); }
    .btn-icon { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .btn-icon:hover { background: var(--bg); color: var(--text); }
    .btn-logout { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 7px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .2s; }
    .btn-logout:hover { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    [data-theme="dark"] .btn-logout:hover { background: rgba(185,28,28,.15); }

    .launcher-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; gap: 56px; }
    .launcher-greeting { text-align: center; }
    .launcher-greeting h2 { font-size: 30px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
    .launcher-greeting p { color: var(--text-muted); font-size: 15px; }

    /* Icon dock */
    .apps-dock { display: flex; align-items: flex-end; gap: 32px; }
    .app-icon-btn {
      display: flex; flex-direction: column; align-items: center; gap: 10px; text-decoration: none; cursor: pointer; outline: none; border: none; background: none; padding: 0;
    }
    .app-icon-wrap {
      width: 88px; height: 88px; border-radius: 22px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease;
      position: relative; overflow: hidden;
    }
    .app-icon-wrap::after {
      content: ''; position: absolute; inset: 0; opacity: 0;
      transition: opacity .2s;
      background: rgba(255,255,255,0.15);
    }
    .app-icon-btn:hover .app-icon-wrap { transform: translateY(-8px) scale(1.06); box-shadow: 0 20px 48px rgba(0,0,0,0.18), 0 4px 12px rgba(0,0,0,0.08); }
    .app-icon-btn:hover .app-icon-wrap::after { opacity: 1; }
    .app-icon-btn:active .app-icon-wrap { transform: translateY(-2px) scale(0.98); }
    .app-icon-wrap svg { position: relative; z-index: 1; }
    .app-icon-wrap.atlas { background: linear-gradient(145deg, #818cf8, #6366f1, #4f46e5); }
    .app-icon-wrap.fit { background: linear-gradient(145deg, #34d399, #10b981, #059669); }
    .app-icon-label { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.2px; transition: color .2s; }
    .app-icon-btn:hover .app-icon-label { color: var(--text); }

    /* Dock glass shelf */
    .dock-shelf {
      background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.9); border-radius: 28px; padding: 20px 36px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    [data-theme="dark"] .dock-shelf {
      background: rgba(30,41,59,0.7);
      border-color: rgba(255,255,255,0.08);
      box-shadow: 0 4px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    @media (max-width: 640px) {
      .launcher-header { padding: 16px 20px; }
      .launcher-brand span { display: none; }
      .user-info span { display: none; }
      .launcher-greeting h2 { font-size: 24px; }
      .apps-dock { gap: 20px; }
      .app-icon-wrap { width: 72px; height: 72px; border-radius: 18px; }
      .dock-shelf { padding: 16px 24px; border-radius: 22px; }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loadingScreen">
    <div class="logo">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="36" cy="36" r="36" fill="rgba(255,255,255,0.15)"/>
        <polygon points="36,14 60,58 12,58" fill="white"/>
        <circle cx="36" cy="32" r="8" fill="rgba(99,102,241,0.9)"/>
      </svg>
    </div>
    <div class="loading-bar"><div class="loading-bar-inner"></div></div>
    <p>Carregando Hub Pessoal…</p>
  </div>

  <!-- Auth Screen -->
  <div id="authScreen">
    <div class="auth-card">
      <div class="auth-logo">
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="26" fill="#6366f1"/>
          <polygon points="26,10 44,42 8,42" fill="white"/>
          <circle cx="26" cy="24" r="6" fill="#6366f1"/>
        </svg>
        <h1>Hub Pessoal</h1>
        <p>Seu espaço de produtividade e bem-estar</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showLogin()">Entrar</button>
        <button class="auth-tab" onclick="showRegister()">Criar conta</button>
      </div>

      <!-- Login form -->
      <div id="loginForm">
        <div id="loginError" class="auth-error"></div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="authEmail" placeholder="seu@email.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="authPassword" placeholder="Sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
        </div>
        <button class="btn btn-primary" onclick="login()" id="loginBtn">Entrar</button>
        <div class="auth-footer">
          <button class="btn-link" onclick="forgotPassword()">Esqueci minha senha</button>
        </div>
      </div>

      <!-- Register form -->
      <div id="registerForm" style="display:none">
        <div id="registerError" class="auth-error"></div>
        <div id="registerSuccess" class="auth-success"></div>
        <div class="form-group">
          <label>Nome (opcional)</label>
          <input type="text" id="authName" placeholder="Seu nome"/>
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="authRegEmail" placeholder="seu@email.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="authRegPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password" onkeydown="if(event.key==='Enter')register()"/>
        </div>
        <button class="btn btn-primary" onclick="register()" id="registerBtn">Criar conta</button>
      </div>
    </div>
  </div>

  <!-- Launcher Screen -->
  <div id="launcherScreen">
    <header class="launcher-header">
      <div class="launcher-brand">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="16" fill="#6366f1"/>
          <polygon points="16,6 26,24 6,24" fill="white"/>
          <circle cx="16" cy="14" r="4" fill="#6366f1"/>
        </svg>
        <span>Hub Pessoal</span>
      </div>
      <div class="launcher-header-right">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <span id="userDisplayName"></span>
        </div>
        <button class="btn-icon" onclick="toggleTheme()" title="Alternar tema">
          <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>
    </header>
    <div class="launcher-body">
      <div class="launcher-greeting">
        <h2 id="greeting">Olá!</h2>
        <p id="launcherDate"></p>
      </div>
      <div class="dock-shelf">
        <div class="apps-dock">
          <a href="/atlas" class="app-icon-btn">
            <div class="app-icon-wrap atlas">
              <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="22,6 38,36 6,36" fill="rgba(255,255,255,0.95)"/>
                <circle cx="22" cy="20" r="6" fill="rgba(79,70,229,0.85)"/>
              </svg>
            </div>
            <span class="app-icon-label">Atlas</span>
          </a>
          <a href="/fitness" class="app-icon-btn">
            <div class="app-icon-wrap fit">
              <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 22h5l3-9 6 18 5-12 3 6h10" stroke="rgba(255,255,255,0.95)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </div>
            <span class="app-icon-label">FitHub</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let _token = localStorage.getItem('atlas_token');

    async function apiFetch(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (_token) headers['Authorization'] = 'Bearer ' + _token;
      const res = await fetch(API_BASE + path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
      const data = await res.json().catch(() => ({}));
      return { ok: res.ok, status: res.status, data };
    }

    async function init() {
      applyTheme();
      if (_token) {
        const res = await apiFetch('/auth/me');
        if (res.ok && res.data?.user) {
          showLauncher(res.data.user);
          return;
        } else {
          localStorage.removeItem('atlas_token');
          localStorage.removeItem('atlas_refresh');
          localStorage.removeItem('atlas_user');
          _token = null;
        }
      }
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('authScreen').classList.add('visible');
    }

    function showLauncher(user) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('authScreen').classList.remove('visible');
      document.getElementById('launcherScreen').classList.add('visible');
      const name = user.user_metadata?.name || user.email?.split('@')[0] || 'usuário';
      const hr = new Date().getHours();
      const greet = hr < 12 ? 'Bom dia' : hr < 18 ? 'Boa tarde' : 'Boa noite';
      document.getElementById('greeting').textContent = greet + ', ' + name + '!';
      document.getElementById('userDisplayName').textContent = name;
      document.getElementById('userAvatar').textContent = name[0].toUpperCase();
      const days = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
      const months = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
      const d = new Date();
      document.getElementById('launcherDate').textContent = days[d.getDay()] + ', ' + d.getDate() + ' de ' + months[d.getMonth()] + ' de ' + d.getFullYear();
    }

    async function login() {
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      if (!email || !password) { errEl.textContent = 'Preencha todos os campos.'; errEl.style.display = 'block'; return; }
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Entrando…'; btn.disabled = true;
      const res = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      btn.textContent = 'Entrar'; btn.disabled = false;
      if (res.ok && res.data?.session) {
        const { session, user } = res.data;
        localStorage.setItem('atlas_token', session.access_token);
        if (session.refresh_token) localStorage.setItem('atlas_refresh', session.refresh_token);
        localStorage.setItem('atlas_user', JSON.stringify(user));
        _token = session.access_token;
        showLauncher(user);
      } else {
        errEl.textContent = res.data?.error || 'Credenciais inválidas.';
        errEl.style.display = 'block';
      }
    }

    async function register() {
      const name = document.getElementById('authName').value.trim();
      const email = document.getElementById('authRegEmail').value.trim();
      const password = document.getElementById('authRegPassword').value;
      const errEl = document.getElementById('registerError');
      const sucEl = document.getElementById('registerSuccess');
      errEl.style.display = 'none'; sucEl.style.display = 'none';
      if (!email || !password) { errEl.textContent = 'E-mail e senha são obrigatórios.'; errEl.style.display = 'block'; return; }
      if (password.length < 6) { errEl.textContent = 'Senha deve ter mínimo 6 caracteres.'; errEl.style.display = 'block'; return; }
      const btn = document.getElementById('registerBtn');
      btn.textContent = 'Criando…'; btn.disabled = true;
      const res = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ email, password, name }) });
      btn.textContent = 'Criar conta'; btn.disabled = false;
      if (res.ok) {
        if (res.data?.session) {
          const { session, user } = res.data;
          localStorage.setItem('atlas_token', session.access_token);
          if (session.refresh_token) localStorage.setItem('atlas_refresh', session.refresh_token);
          localStorage.setItem('atlas_user', JSON.stringify(user));
          _token = session.access_token;
          showLauncher(user);
        } else {
          sucEl.textContent = 'Conta criada! Verifique seu e-mail para confirmar.';
          sucEl.style.display = 'block';
        }
      } else {
        errEl.textContent = res.data?.error || 'Erro ao criar conta.';
        errEl.style.display = 'block';
      }
    }

    async function forgotPassword() {
      const email = prompt('Digite seu e-mail para recuperar a senha:');
      if (!email) return;
      const res = await apiFetch('/auth/forgot-password', { method: 'POST', body: JSON.stringify({ email }) });
      alert(res.ok ? 'E-mail de recuperação enviado!' : (res.data?.error || 'Erro ao enviar e-mail.'));
    }

    async function logout() {
      if (!confirm('Deseja sair?')) return;
      await apiFetch('/auth/logout', { method: 'POST' }).catch(() => {});
      localStorage.removeItem('atlas_token');
      localStorage.removeItem('atlas_refresh');
      localStorage.removeItem('atlas_user');
      _token = null;
      location.reload();
    }

    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.querySelectorAll('.auth-tab')[0].classList.add('active');
      document.querySelectorAll('.auth-tab')[1].classList.remove('active');
    }

    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.querySelectorAll('.auth-tab')[0].classList.remove('active');
      document.querySelectorAll('.auth-tab')[1].classList.add('active');
    }

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('hub_theme', isDark ? 'light' : 'dark');
    }

    function applyTheme() {
      const t = localStorage.getItem('hub_theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    }

    init();
  </script>
</body>
</html>
